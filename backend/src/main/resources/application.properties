# Configuración de base de datos SQLite
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:hornado.db

# Configuración de Hibernate (Esquema automático)
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# Configuración del servidor para red local
quarkus.http.host=0.0.0.0

# CORS Global
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with, origin
quarkus.http.cors.methods=GET, POST, OPTIONS, PUT, DELETE
